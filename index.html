<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MyTube</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap');

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f0f0f2;
    --surface3: #e5e5ea;
    --border: #e0e0e5;
    --accent: #ff0040;
    --accent-soft: rgba(255,0,64,0.08);
    --accent2: #ff4060;
    --text: #1a1a1a;
    --text2: #6e6e73;
    --text3: #aaaaaa;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-card: 0 1px 6px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 22px; letter-spacing: -1px;
    color: var(--text); flex-shrink: 0;
  }
  .logo em { color: var(--accent); font-style: normal; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); display: none; }
  .btn-login {
    background: var(--accent); color: #fff; border: none;
    border-radius: 20px; padding: 8px 16px;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 12px; cursor: pointer;
  }
  .btn-icon {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }

  /* TABS */
  .tabs {
    display: flex; gap: 6px; padding: 10px 16px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
    position: sticky; top: calc(var(--safe-top) + 57px); z-index: 40;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text2); transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  main { flex: 1; display: flex; flex-direction: column; }

  /* PLAYER */
  #player-section { background: #000; }
  #player-section.hidden { display: none; }
  #player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
  #player-wrap iframe, #player-wrap video { width: 100%; height: 100%; border: none; display: block; }
  .player-info {
    padding: 12px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .player-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; }
  .player-channel { font-size: 12px; color: var(--text2); }

  /* RELATED */
  #related-section { padding: 0 16px 8px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .related-title {
    font-family: 'Space Grotesk', sans-serif; font-size: 11px;
    font-weight: 700; color: var(--text2); text-transform: uppercase;
    letter-spacing: 1px; padding: 12px 0 8px;
  }

  /* VIDEO GRID - big thumbnails */
  .video-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px;
  }

  .video-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    box-shadow: var(--shadow-card);
    border: 1.5px solid transparent;
    transition: box-shadow 0.2s, border-color 0.2s;
    position: relative;
  }
  .video-card:active { box-shadow: none; }
  .video-card.playing { border-color: var(--accent); }
  .video-card.previewing { border-color: #ff8800; }

  .video-card .thumb-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface3);
    overflow: hidden;
    position: relative;
  }
  .video-card .thumb-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: transform 0.2s;
  }
  .video-card:active .thumb-wrap img { transform: scale(0.97); }

  .thumb-ph {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: var(--text3); background: var(--surface3);
  }

  /* preview iframe inside card */
  .preview-frame {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .preview-badge {
    position: absolute; top: 6px; right: 6px;
    background: rgba(255,136,0,0.9);
    color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 10px;
    pointer-events: none;
  }

  .play-badge {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,0,64,0.12);
    font-size: 28px;
    pointer-events: none;
  }

  .tap-hint {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.55); color: #fff;
    font-size: 10px; padding: 3px 8px; border-radius: 10px;
    white-space: nowrap; pointer-events: none;
  }

  .video-card .card-body {
    padding: 8px 10px 10px;
  }
  .card-title {
    font-size: 12px; font-weight: 500; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 4px; color: var(--text);
  }
  .card-channel { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-date { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* RANK BADGE */
  .rank-badge {
    position: absolute; top: 6px; left: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 13px;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 2;
  }
  .rank-1 { background: #FFD700; color: #7a5000; }
  .rank-2 { background: #C0C0C0; color: #444; }
  .rank-3 { background: #CD7F32; color: #fff; }
  .rank-n { background: rgba(0,0,0,0.55); color: #fff; font-size: 11px; }

  /* LIST layout for related / search */
  .video-list { display: flex; flex-direction: column; gap: 10px; padding: 12px 16px; }

  .video-list-card {
    display: flex; gap: 10px; cursor: pointer;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 8px;
    box-shadow: var(--shadow-card);
    border: 1.5px solid transparent;
    transition: box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .video-list-card:active { box-shadow: none; }
  .video-list-card.playing { border-color: var(--accent); }
  .video-list-card.previewing { border-color: #ff8800; }

  .list-thumb-wrap {
    width: 110px; height: 62px; border-radius: 8px;
    background: var(--surface3); overflow: hidden; flex-shrink: 0;
    position: relative;
  }
  .list-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }

  .list-meta { flex: 1; min-width: 0; }
  .list-title {
    font-size: 12px; font-weight: 500; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px;
  }
  .list-channel { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-date { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* SECTION HEADER */
  .section-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 4px;
  }
  .section-hd h3 {
    font-family: 'Space Grotesk', sans-serif; font-size: 15px;
    font-weight: 700; color: var(--text);
  }
  .section-hd a { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: none; }

  /* SEARCH */
  #page-search { padding-top: 4px; }
  .search-bar { display: flex; gap: 8px; padding: 12px 16px; }
  .search-input {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 24px; padding: 12px 18px; color: var(--text);
    font-size: 14px; outline: none; font-family: inherit;
    box-shadow: var(--shadow-card);
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .btn-search {
    background: var(--accent); color: #fff; border: none;
    border-radius: 24px; padding: 12px 20px; font-size: 16px; cursor: pointer;
  }

  /* CHANNELS */
  #page-channels { padding: 16px; }
  .channel-list { display: flex; flex-direction: column; gap: 2px; }
  .channel-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 8px; border-radius: var(--radius);
    cursor: pointer; transition: background 0.15s;
    background: var(--surface); margin-bottom: 4px;
    box-shadow: var(--shadow-card);
  }
  .channel-item:active { background: var(--surface2); }
  .ch-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--surface3); overflow: hidden; flex-shrink: 0; }
  .ch-icon img { width: 100%; height: 100%; object-fit: cover; }
  .ch-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-arrow { color: var(--text3); font-size: 18px; }
  .btn-yt {
    background: #ff0000; color: #fff; border: none;
    border-radius: 8px; padding: 6px 10px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  }

  /* QUEUE */
  #page-queue { padding: 16px; }
  .queue-actions { display: flex; gap: 8px; margin-bottom: 16px; }
  .btn-sm {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 10px;
    font-size: 12px; font-weight: 500; cursor: pointer; text-align: center;
    box-shadow: var(--shadow-card);
  }
  .btn-sm.danger { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .url-input {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 11px 14px; color: var(--text);
    font-size: 13px; outline: none; font-family: inherit;
    box-shadow: var(--shadow-card);
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--text3); }
  .btn-add {
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 11px 16px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
  }
  .queue-item {
    display: flex; align-items: center; gap: 10px; padding: 8px;
    border-radius: var(--radius); cursor: pointer;
    border: 1.5px solid transparent; position: relative;
    background: var(--surface); margin-bottom: 6px;
    box-shadow: var(--shadow-card);
  }
  .queue-item:active { background: var(--surface2); }
  .queue-item.playing { border-color: var(--accent); background: var(--accent-soft); }
  .queue-item.playing::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 3px; background: var(--accent); border-radius: 2px;
  }
  .q-thumb { width: 80px; height: 45px; border-radius: 6px; background: var(--surface3); overflow: hidden; flex-shrink: 0; }
  .q-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .q-info { flex: 1; min-width: 0; }
  .q-title { font-size: 12px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; margin-bottom: 3px; }
  .q-id { font-size: 10px; color: var(--text3); font-family: monospace; }
  .q-del { background: none; border: none; color: var(--text3); font-size: 18px; padding: 6px; cursor: pointer; flex-shrink: 0; }

  /* LOGIN GATE */
  .login-gate {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center; gap: 16px;
  }
  .login-gate .icon { font-size: 52px; opacity: 0.25; }
  .login-gate h2 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
  .login-gate p { font-size: 13px; color: var(--text2); line-height: 1.7; max-width: 280px; }

  /* LOADING / EMPTY */
  .loading { display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 12px; color: var(--text2); font-size: 13px; }
  .spinner { width: 26px; height: 26px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px 24px; color: var(--text2); font-size: 13px; line-height: 1.8; }

  /* TOAST */
  #toast {
    position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(30,30,30,0.92); color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; transition: transform 0.3s ease; z-index: 200;
    white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
    backdrop-filter: blur(8px);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* NOW BAR */
  #now-bar {
    position: sticky; bottom: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 10px 16px calc(10px + var(--safe-bottom));
    display: none; align-items: center; gap: 10px; z-index: 40;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  #now-bar.visible { display: flex; }
  .now-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #now-bar-title { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .now-bar-scroll { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 5px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }

  /* HOME */
  #page-home { padding-bottom: 20px; }
  #page-search { padding-bottom: 20px; }

  .resume-badge {
    position: absolute; bottom: 4px; left: 4px;
    background: rgba(255,0,64,0.88); color: #fff;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 8px; pointer-events: none;
  }

  </style>
</head>
<body>

<header>
  <div class="logo">My<em>Tube</em></div>
  <div class="header-right">
    <img class="avatar" id="user-avatar" src="" alt="">
    <button class="btn-login" id="btn-login" onclick="handleLogin()">Googleでログイン</button>
    <button class="btn-icon" id="btn-logout" style="display:none" onclick="handleLogout()" title="ログアウト">⏻</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('home')">ホーム</button>
  <button class="tab" onclick="switchTab('trend')">🏆 トレンド</button>
  <button class="tab" onclick="switchTab('search')">🔍 検索</button>
  <button class="tab" onclick="switchTab('channels')">チャンネル</button>
  <button class="tab" onclick="switchTab('history')">🕐 履歴</button>
  <button class="tab" onclick="switchTab('queue')">キュー</button>
</div>

<div id="player-section" class="hidden">
  <div id="player-wrap"></div>
  <div class="player-info">
    <div class="player-title" id="player-title">—</div>
    <div class="player-channel" id="player-channel"></div>
  </div>
</div>

<div id="related-section" style="display:none">
  <div class="related-title">関連動画</div>
  <div id="related-list" class="video-list"></div>
</div>

<main>

  <!-- HOME -->
  <div id="page-home" style="display:none">
    <div id="home-login-gate" class="login-gate">
      <div class="icon">📺</div>
      <h2>登録チャンネルを表示</h2>
      <p>Googleアカウントでログインすると、登録チャンネルの最新動画が表示されます。</p>
      <button class="btn-login" onclick="handleLogin()">Googleでログイン</button>
    </div>
    <div id="home-content" style="display:none">
      <div class="section-hd">
        <h3 id="home-section-title">最近の動画</h3>
        <a onclick="loadRecentVideos()">更新</a>
      </div>
      <div id="recent-videos"></div>
    </div>
  </div>

  <!-- TREND -->
  <div id="page-trend" style="display:none">
    <div class="section-hd">
      <h3>🇯🇵 日本のトレンド Top100</h3>
      <a onclick="loadTrend()">更新</a>
    </div>
    <div id="trend-videos"></div>
  </div>

  <!-- SEARCH -->
  <div id="page-search" style="display:none">
    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="動画を検索…" />
      <button class="btn-search" onclick="doSearch()">🔍</button>
    </div>
    <div id="search-results">
      <div class="empty">キーワードを入力して検索してください</div>
    </div>
  </div>

  <!-- CHANNELS -->
  <div id="page-channels" style="display:none">
    <div id="channels-login-gate" class="login-gate">
      <div class="icon">📡</div>
      <h2>チャンネル一覧</h2>
      <p>ログインすると登録チャンネルが表示されます。</p>
      <button class="btn-login" onclick="handleLogin()">Googleでログイン</button>
    </div>
    <div id="channels-content" style="display:none">
      <div class="section-hd">
        <h3>登録チャンネル</h3>
        <a onclick="loadSubscriptions()">更新</a>
      </div>
      <div id="channel-list" class="channel-list" style="padding:0 16px"></div>
    </div>
  </div>


  <!-- HISTORY -->
  <div id="page-history" style="display:none">
    <div class="section-hd">
      <h3>視聴履歴</h3>
      <a onclick="clearHistory()">🗑 全削除</a>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- QUEUE -->
  <div id="page-queue" style="display:none">
    <div class="input-row">
      <input class="url-input" id="url-input" placeholder="YouTubeのURLまたは動画IDを入力…" />
      <button class="btn-add" onclick="addToQueue()">追加</button>
    </div>
    <div class="queue-actions">
      <button class="btn-sm" onclick="shuffleQueue()">🔀 シャッフル</button>
      <button class="btn-sm danger" onclick="clearQueue()">🗑 全削除</button>
    </div>
    <div id="queue-list"></div>
  </div>

</main>

<div id="now-bar">
  <div class="now-dot"></div>
  <div id="now-bar-title">—</div>
  <div class="now-bar-scroll" onclick="scrollToPlayer()">▲ 動画へ</div>
</div>
<div id="toast"></div>

<script>
const CLIENT_ID = '801692007843-5asbch4e2eqiod34p2d0gqjlbi236s5f.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/youtube.readonly';
const API_BASE = 'https://www.googleapis.com/youtube/v3';

let accessToken = null;
let subscriptions = [];
let queue = [];
let currentVidIndex = -1;
let currentTab = 'home';
let tokenClient = null;
let recentVideos = [];
let currentVideoId = null;
let previewingId = null; // card currently in preview mode

// ===== AUTH =====
function dbg(msg) {
  // 画面上部にデバッグメッセージ表示
  let el = document.getElementById('debug-bar');
  if (!el) {
    el = document.createElement('div');
    el.id = 'debug-bar';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#000;color:#0f0;font-size:11px;padding:4px 8px;font-family:monospace;max-height:120px;overflow-y:auto';
    document.body.prepend(el);
  }
  el.innerHTML += msg + '<br>';
}

window.onload = () => {
  switchTab('home');
  renderQueue();
  dbg('onload fired');
  const tryInit = () => {
    dbg('tryInit: google=' + !!(window.google) + ' oauth2=' + !!(window.google && google.accounts && google.accounts.oauth2));
    if (window.google && google.accounts && google.accounts.oauth2) {
      initTokenClient();
      const saved = localStorage.getItem('yt_token');
      const expiry = parseInt(localStorage.getItem('yt_token_expiry') || '0');
      dbg('token saved=' + !!saved + ' expiry=' + new Date(expiry).toLocaleTimeString() + ' now=' + new Date().toLocaleTimeString() + ' valid=' + (Date.now() < expiry));
      // expiryがない古いトークンはそのまま使う（フォールバック）
      const noExpiry = expiry === 0;
      if (saved && (noExpiry || Date.now() < expiry)) {
        accessToken = saved;
        dbg('calling onLoggedIn noExpiry=' + noExpiry);
        onLoggedIn();
      } else {
        localStorage.removeItem('yt_token');
        localStorage.removeItem('yt_token_expiry');
        dbg('token expired or missing');
        if (saved) showToast('セッション期限切れです。再ログインしてください');
      }
    } else {
      setTimeout(tryInit, 300);
    }
  };
  setTimeout(tryInit, 300);
};

function initTokenClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { showToast('ログイン失敗: ' + resp.error); return; }
      accessToken = resp.access_token;
      localStorage.setItem('yt_token', accessToken);
      localStorage.setItem('yt_token_expiry', Date.now() + 55 * 60 * 1000); // 55分
      onLoggedIn();
    }
  });
}
function handleLogin() {
  if (!tokenClient) { showToast('Google SDKを読み込み中…'); return; }
  tokenClient.requestAccessToken();
}
function handleLogout() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);
  accessToken = null; localStorage.removeItem('yt_token'); localStorage.removeItem('yt_token_expiry');
  subscriptions = []; recentVideos = [];
  document.getElementById('btn-login').style.display = '';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('user-avatar').style.display = 'none';
  document.getElementById('home-login-gate').style.display = '';
  document.getElementById('home-content').style.display = 'none';
  document.getElementById('channels-login-gate').style.display = '';
  document.getElementById('channels-content').style.display = 'none';
  showToast('ログアウトしました');
}
async function onLoggedIn() {
  document.getElementById('btn-login').style.display = 'none';
  document.getElementById('btn-logout').style.display = '';
  document.getElementById('home-login-gate').style.display = 'none';
  document.getElementById('home-content').style.display = '';

  await loadRecentVideos();
}

// ===== API =====
async function apiGet(endpoint, params = {}) {
  const url = new URL(API_BASE + endpoint);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const r = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (!r.ok) {
    throw new Error(`API Error ${r.status}`);
  }
  return r.json();
}

let trendLoaded = false;

async function loadTrend() {
  if (!accessToken) { showToast('ログインが必要です'); return; }

// ===== SUBSCRIPTIONS =====
async function loadSubscriptions() {
  subscriptions = [];
  let pageToken = '';
  dbg('loadSubscriptions start, token=' + (accessToken ? 'ok' : 'null'));
  try {
    while (true) {
      const params = { part: 'snippet', mine: true, maxResults: 50, order: 'alphabetical' };
      if (pageToken) params.pageToken = pageToken;
      dbg('fetching subscriptions page...');
      const data = await apiGet('/subscriptions', params);
      dbg('got ' + (data.items||[]).length + ' items, next=' + !!data.nextPageToken);
      const items = (data.items || []).map(i => ({
        id: i.snippet.resourceId.channelId,
        name: i.snippet.title,
        thumb: i.snippet.thumbnails?.default?.url || ''
      }));
      subscriptions = [...subscriptions, ...items];
      if (data.nextPageToken) pageToken = data.nextPageToken;
      else break;
    }
    renderChannels();
  } catch (e) {
    showToast('チャンネル取得失敗: ' + e.message);
    throw e;
  }
}

// ===== TAP: preview → play =====
function handleCardTap(card) {
  const id = card.dataset.id;
  const title = card.dataset.title;
  const ch = card.dataset.ch;

  if (card.classList.contains('previewing')) {
    // 2nd tap: full play
    stopPreview();
    playVideo(id, title, ch);
    return;
  }

  // 1st tap: muted preview
  stopPreview();
  previewingId = id;
  card.classList.add('previewing');

  const thumbWrap = card.querySelector('.thumb-wrap, .list-thumb-wrap');
  // inject muted autoplay iframe
  const iframe = document.createElement('iframe');
  iframe.className = 'preview-frame';
  iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1`;
  iframe.allow = 'autoplay; encrypted-media';
  thumbWrap.appendChild(iframe);

  // update hint
  const hint = card.querySelector('.tap-hint');
  if (hint) hint.textContent = 'もう一度タップで本再生';

  const badge = document.createElement('div');
  badge.className = 'preview-badge';
  badge.textContent = '▶ プレビュー中';
  thumbWrap.appendChild(badge);
}

function stopPreview() {
  if (!previewingId) return;
  document.querySelectorAll('.previewing').forEach(card => {
    card.classList.remove('previewing');
    card.querySelectorAll('.preview-frame, .preview-badge').forEach(el => el.remove());
    const hint = card.querySelector('.tap-hint');
    if (hint) hint.textContent = 'タップでプレビュー';
  });
  previewingId = null;
}

// ===== HISTORY =====
const HISTORY_KEY = 'mytube_history';
const RESUME_KEY = 'mytube_resume';
const MAX_HISTORY = 100;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}
function saveHistory(id, title, channel, thumb) {
  let h = getHistory().filter(v => v.id !== id); // remove duplicate
  h.unshift({ id, title, channel, thumb, watchedAt: Date.now() });
  if (h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  if (currentTab === 'history') renderHistory();
}
function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
  showToast('履歴を削除しました');
}
function removeHistoryItem(id) {
  const h = getHistory().filter(v => v.id !== id);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('history-list');
  const h = getHistory();
  if (!h.length) { el.innerHTML = '<div class="empty">視聴履歴がありません</div>'; return; }
  el.innerHTML = h.map(v => {
    const resume = getResume(v.id);
    const resumeStr = resume > 5 ? `<span class="resume-badge">▶ ${formatSeconds(resume)}から</span>` : '';
    return `
    <div class="video-list-card" data-id="${v.id}" data-title="${escAttr(v.title)}" data-ch="${escAttr(v.channel)}" onclick="handleCardTap(this)">
      <div class="list-thumb-wrap" style="position:relative">
        ${v.thumb ? `<img src="${v.thumb}" alt="" loading="lazy">` : '<div class="thumb-ph" style="font-size:18px">▶</div>'}
        ${resumeStr}
      </div>
      <div class="list-meta">
        <div class="list-title">${escHtml(v.title)}</div>
        <div class="list-channel">${escHtml(v.channel || '')}</div>
        <div class="list-date">${formatAgo(v.watchedAt)}</div>
      </div>
      <button class="q-del" onclick="event.stopPropagation();removeHistoryItem('${v.id}')">✕</button>
    </div>`;
  }).join('');
}

// ===== RESUME =====
function getResume(id) {
  try {
    const d = JSON.parse(localStorage.getItem(RESUME_KEY) || '{}');
    return d[id] || 0;
  } catch { return 0; }
}
function saveResume(id, seconds) {
  try {
    const d = JSON.parse(localStorage.getItem(RESUME_KEY) || '{}');
    d[id] = Math.floor(seconds);
    // keep max 200 entries
    const keys = Object.keys(d);
    if (keys.length > 200) delete d[keys[0]];
    localStorage.setItem(RESUME_KEY, JSON.stringify(d));
  } catch {}
}
function formatSeconds(s) {
  s = Math.floor(s);
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function formatAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'たった今';
  if (m < 60) return `${m}分前`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}時間前`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d}日前`;
  return `${Math.floor(d/30)}ヶ月前`;
}

let resumeCheckTimer = null;
let currentIframe = null;

function playVideo(id, title, channel = '', forceStart = null) {
  stopPreview();
  currentVideoId = id;
  const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  // check resume position
  const savedPos = getResume(id);
  const startSec = forceStart !== null ? forceStart : (savedPos > 5 ? savedPos : 0);

  if (startSec > 5 && forceStart === null) {
    // show resume prompt
    showResumePrompt(id, title, channel, savedPos);
    return;
  }

  const src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&start=${Math.floor(startSec)}&enablejsapi=1`;
  document.getElementById('player-section').classList.remove('hidden');
  document.getElementById('player-wrap').innerHTML =
    `<iframe id="yt-iframe" src="${src}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
  currentIframe = document.getElementById('yt-iframe');

  document.getElementById('player-title').textContent = title;
  document.getElementById('player-channel').textContent = channel;
  document.getElementById('now-bar').classList.add('visible');
  document.getElementById('now-bar-title').textContent = title;

  // save history
  saveHistory(id, title, channel, thumb);

  // save resume position every 5 seconds via postMessage polling
  clearInterval(resumeCheckTimer);
  resumeCheckTimer = setInterval(() => {
    if (currentIframe) {
      try { currentIframe.contentWindow.postMessage('{"event":"command","func":"getCurrentTime","args":""}', '*'); } catch {}
    }
  }, 5000);

  scrollToPlayer();
  if (accessToken) loadRelatedVideos(id);
}

function showResumePrompt(id, title, channel, pos) {
  const wrap = document.getElementById('player-wrap');
  const sec = document.getElementById('player-section');
  sec.classList.remove('hidden');
  wrap.innerHTML = `
    <div style="background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;
      aspect-ratio:16/9;gap:12px;padding:16px;text-align:center">
      <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" style="width:120px;border-radius:8px;opacity:0.7">
      <div style="color:#fff;font-size:13px;font-weight:500">${escHtml(title)}</div>
      <div style="color:#aaa;font-size:12px">${formatSeconds(pos)} まで視聴済み</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button onclick="playVideo('${id}','${escAttr(title)}','${escAttr(channel)}',${Math.floor(pos)})"
          style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer">
          ▶ ${formatSeconds(pos)}から再生
        </button>
        <button onclick="playVideo('${id}','${escAttr(title)}','${escAttr(channel)}',0)"
          style="background:#333;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer">
          最初から
        </button>
      </div>
    </div>`;
  document.getElementById('player-title').textContent = title;
  document.getElementById('player-channel').textContent = channel;
  document.getElementById('now-bar').classList.add('visible');
  document.getElementById('now-bar-title').textContent = title;
  scrollToPlayer();
}

// Listen for YouTube iframe postMessage (time updates)
window.addEventListener('message', (e) => {
  if (!e.data || typeof e.data !== 'string') return;
  try {
    const d = JSON.parse(e.data);
    if (d.event === 'infoDelivery' && d.info && d.info.currentTime && currentVideoId) {
      saveResume(currentVideoId, d.info.currentTime);
    }
  } catch {}
});

function playQueueItem(i) {
  currentVidIndex = i;
  playVideo(queue[i].id, queue[i].title);
  renderQueue();
}

function scrollToPlayer() {
  document.getElementById('player-section').scrollIntoView({ behavior: 'smooth' });
}

// ===== QUEUE OPS =====
function extractVideoId(input) {
  input = input.trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
  try {
    const url = new URL(input.startsWith('http') ? input : 'https://' + input);
    if (url.hostname.includes('youtu.be')) return url.pathname.slice(1).split('?')[0];
    if (url.hostname.includes('youtube.com')) return url.searchParams.get('v') || url.pathname.split('/').pop();
  } catch {}
  const m = input.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

async function addToQueue() {
  const input = document.getElementById('url-input').value;
  const id = extractVideoId(input);
  if (!id) { showToast('URLを認識できませんでした'); return; }
  if (queue.find(v => v.id === id)) { showToast('既に追加済みです'); return; }
  const item = { id, title: `動画: ${id}`, thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg` };
  queue.push(item);
  document.getElementById('url-input').value = '';
  renderQueue();
  try {
    const r = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
    const d = await r.json();
    item.title = d.title || item.title;
    renderQueue();
  } catch {}
  if (currentVidIndex === -1) playQueueItem(queue.length - 1);
  showToast('追加しました');
}

function removeFromQueue(i) {
  queue.splice(i, 1);
  if (i === currentVidIndex) currentVidIndex = -1;
  else if (i < currentVidIndex) currentVidIndex--;
  renderQueue();
}
function clearQueue() { queue = []; currentVidIndex = -1; renderQueue(); showToast('キューを削除しました'); }
function shuffleQueue() { queue = shuffle(queue); currentVidIndex = -1; renderQueue(); showToast('シャッフルしました'); }

// ===== TABS =====
function switchTab(tab) {
  stopPreview();
  currentTab = tab;
  ['home','trend','search','channels','history','queue'].forEach(t => {
    document.getElementById(`page-${t}`).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['home','trend','search','channels','history','queue'][i] === tab);
  });
  if (tab === 'trend' && !trendLoaded) loadTrend();
  if (tab === 'history') renderHistory();
}

// ===== UTILS =====
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') addToQueue(); });
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
});
</script>
